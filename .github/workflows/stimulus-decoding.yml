name: Manual stimulus decoding

on:
  workflow_dispatch:
    inputs:
      runner:
        description: Runner label. Use self-hosted when the MEG data are available only on a local runner.
        required: true
        default: ubuntu-latest
        type: choice
        options:
          - ubuntu-latest
          - self-hosted
      python_version:
        description: Python version used for the analysis environment.
        required: true
        default: "3.13"
        type: string
      use_nextcloud_data:
        description: Download/cache the MEG data from the secret MEG_DATA_ALL before running.
        required: true
        default: true
        type: boolean
      data_cache_version:
        description: Bump this value, e.g. v2, to force a fresh Nextcloud download/cache.
        required: true
        default: v1
        type: string
      data_dir:
        description: Data directory to use or populate. For Nextcloud downloads, this is the cache target directory.
        required: true
        default: .cache/meg-data-all
        type: string
      participants:
        description: Participant ids, e.g. 1-4,6,8. Leave empty to auto-detect participants with main and cue files.
        required: false
        default: ""
        type: string
      time_window:
        description: Window-center range as start,stop in seconds. Include pre-stimulus time for the null comparison.
        required: true
        default: "-0.4,0.8"
        type: string
      window_step_s:
        description: Step between time-window centers in seconds.
        required: true
        default: "0.025"
        type: string
      window_size:
        description: Window size in seconds.
        required: true
        default: "0.1"
        type: string
      classifier:
        description: Classifier name passed to pymegdec-stimulus-decoding.
        required: true
        default: multiclass-svm
        type: string
      classifier_param:
        description: Optional classifier parameter, JSON, Python literal, numeric value, or empty.
        required: false
        default: ""
        type: string
      components_pca:
        description: Number of PCA components, or inf.
        required: true
        default: "100"
        type: string
      frequency_low:
        description: Lower frequency bound in Hz.
        required: true
        default: "0"
        type: string
      frequency_high:
        description: Upper frequency bound in Hz, or inf.
        required: true
        default: inf
        type: string
      chance_classes:
        description: Number of stimulus classes used for the chance line.
        required: true
        default: "16"
        type: string
      permutations:
        description: Number of label shuffles per participant/window for permutation p-values.
        required: true
        default: "1000"
        type: string
      permutation_seed:
        description: Seed for permutation label shuffles.
        required: true
        default: "42"
        type: string
      install_extra:
        description: Optional dependency extra to install.
        required: true
        default: none
        type: choice
        options:
          - none
          - xgboost
          - torch
          - all
      output_prefix:
        description: Prefix for output CSVs and plot directory under outputs/.
        required: true
        default: stimulus_decoding
        type: string
      fail_if_missing_data:
        description: Fail if data_dir does not exist after optional Nextcloud download/cache restore.
        required: true
        default: true
        type: boolean

jobs:
  stimulus-decoding:
    name: Run stimulus decoding
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 360
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Restore cached MEG data
        id: meg-data-cache
        if: ${{ inputs.use_nextcloud_data }}
        uses: actions/cache/restore@v4
        with:
          path: ${{ inputs.data_dir }}
          key: meg-data-all-${{ runner.os }}-${{ inputs.data_cache_version }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install package
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [[ "${{ inputs.install_extra }}" == "none" ]]; then
            python -m pip install -e .
          else
            python -m pip install -e ".[${{ inputs.install_extra }}]"
          fi

      - name: Download MEG data from Nextcloud
        if: ${{ inputs.use_nextcloud_data && steps.meg-data-cache.outputs.cache-hit != 'true' }}
        shell: bash
        env:
          MEG_DATA_ALL: ${{ secrets.MEG_DATA_ALL }}
          DATA_DIR: ${{ inputs.data_dir }}
        run: |
          set -euo pipefail
          if [[ -z "${MEG_DATA_ALL:-}" ]]; then
            echo "The MEG_DATA_ALL repository secret is empty or unavailable." >&2
            exit 1
          fi

          rm -rf "${DATA_DIR}"
          mkdir -p "${DATA_DIR}"

          python - <<'PY'
          from __future__ import annotations

          import os
          import shutil
          import sys
          import urllib.request
          import zipfile
          from pathlib import Path

          def safe_extract(zip_file: zipfile.ZipFile, target_dir: Path) -> None:
              target_dir = target_dir.resolve()
              for member in zip_file.infolist():
                  destination = (target_dir / member.filename).resolve()
                  if not str(destination).startswith(str(target_dir) + os.sep) and destination != target_dir:
                      raise RuntimeError(f"Refusing unsafe ZIP member: {member.filename}")
              zip_file.extractall(target_dir)

          share_url = os.environ["MEG_DATA_ALL"].strip().rstrip("/")
          target_dir = Path(os.environ["DATA_DIR"])
          archive_path = Path(os.environ["RUNNER_TEMP"]) / "meg-data-all.zip"
          download_url = f"{share_url}/download"

          request = urllib.request.Request(
              download_url,
              headers={"User-Agent": "PyMEGDec-GitHub-Actions"},
          )
          try:
              with urllib.request.urlopen(request, timeout=120) as response, archive_path.open("wb") as output:
                  shutil.copyfileobj(response, output, length=1024 * 1024)
          except Exception as exc:  # noqa: BLE001
              raise RuntimeError(
                  "Could not download MEG data from the Nextcloud share stored in MEG_DATA_ALL. "
                  "Check that the public share allows downloads and is not password-protected."
              ) from exc

          if not zipfile.is_zipfile(archive_path):
              raise RuntimeError(
                  "The downloaded Nextcloud payload is not a ZIP archive. "
                  "This usually means the share URL does not permit direct folder download."
              )

          with zipfile.ZipFile(archive_path) as zip_file:
              safe_extract(zip_file, target_dir)

          archive_path.unlink(missing_ok=True)
          print(f"Downloaded and extracted MEG data into {target_dir}.")
          PY

      - name: Resolve and validate data directory
        shell: bash
        env:
          DATA_DIR_INPUT: ${{ inputs.data_dir }}
          FAIL_IF_MISSING_DATA: ${{ inputs.fail_if_missing_data }}
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations

          import os
          import sys
          from pathlib import Path

          root = Path(os.environ["DATA_DIR_INPUT"]).expanduser()
          fail_if_missing = os.environ["FAIL_IF_MISSING_DATA"].lower() == "true"

          if not root.exists():
              message = f"Data directory does not exist: {root}"
              if fail_if_missing:
                  raise SystemExit(message)
              print(message)
              with Path(os.environ["GITHUB_ENV"]).open("a", encoding="utf-8") as env_file:
                  env_file.write(f"PYMEGDEC_ANALYSIS_DATA_DIR={root}\n")
              raise SystemExit(0)

          candidate_counts: dict[Path, tuple[int, int]] = {}
          for main_file in root.rglob("Part*Data.mat"):
              directory = main_file.parent
              main_count, cue_count = candidate_counts.get(directory, (0, 0))
              candidate_counts[directory] = (main_count + 1, cue_count)
          for cue_file in root.rglob("Part*CueData.mat"):
              directory = cue_file.parent
              main_count, cue_count = candidate_counts.get(directory, (0, 0))
              candidate_counts[directory] = (main_count, cue_count + 1)

          valid_candidates = [
              (directory, counts)
              for directory, counts in candidate_counts.items()
              if counts[0] > 0 and counts[1] > 0
          ]
          if not valid_candidates:
              message = f"No directory containing both Part*Data.mat and Part*CueData.mat was found under {root}."
              if fail_if_missing:
                  raise SystemExit(message)
              print(message)
              resolved = root
          else:
              resolved, counts = max(valid_candidates, key=lambda item: (item[1][0] + item[1][1], str(item[0])))
              print(f"Resolved MEG data directory: {resolved}")
              print(f"Found {counts[0]} main MAT files and {counts[1]} cue MAT files in the resolved directory.")

          with Path(os.environ["GITHUB_ENV"]).open("a", encoding="utf-8") as env_file:
              env_file.write(f"PYMEGDEC_ANALYSIS_DATA_DIR={resolved}\n")
          PY

      - name: Save MEG data cache
        if: ${{ inputs.use_nextcloud_data && steps.meg-data-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        continue-on-error: true
        with:
          path: ${{ inputs.data_dir }}
          key: meg-data-all-${{ runner.os }}-${{ inputs.data_cache_version }}

      - name: Run 16-way time-resolved stimulus decoding
        shell: bash
        env:
          PARTICIPANTS: ${{ inputs.participants }}
          TIME_WINDOW: ${{ inputs.time_window }}
          WINDOW_STEP_S: ${{ inputs.window_step_s }}
          WINDOW_SIZE: ${{ inputs.window_size }}
          CLASSIFIER: ${{ inputs.classifier }}
          CLASSIFIER_PARAM: ${{ inputs.classifier_param }}
          COMPONENTS_PCA: ${{ inputs.components_pca }}
          FREQUENCY_LOW: ${{ inputs.frequency_low }}
          FREQUENCY_HIGH: ${{ inputs.frequency_high }}
          CHANCE_CLASSES: ${{ inputs.chance_classes }}
          PERMUTATIONS: ${{ inputs.permutations }}
          PERMUTATION_SEED: ${{ inputs.permutation_seed }}
          OUTPUT_PREFIX: ${{ inputs.output_prefix }}
        run: |
          set -euo pipefail
          mkdir -p outputs

          output_csv="outputs/${OUTPUT_PREFIX}.csv"
          summary_csv="outputs/${OUTPUT_PREFIX}_summary.csv"
          plots_dir="outputs/${OUTPUT_PREFIX}_plots"

          cmd=(
            pymegdec-stimulus-decoding
            --data-dir "${PYMEGDEC_ANALYSIS_DATA_DIR}"
            --output "${output_csv}"
            --summary-output "${summary_csv}"
            --plots-dir "${plots_dir}"
            --time-window "${TIME_WINDOW}"
            --window-step-s "${WINDOW_STEP_S}"
            --window-size "${WINDOW_SIZE}"
            --null-window-center nan
            --classifier "${CLASSIFIER}"
            --components-pca "${COMPONENTS_PCA}"
            --frequency-range "${FREQUENCY_LOW}" "${FREQUENCY_HIGH}"
            --chance-classes "${CHANCE_CLASSES}"
            --permutations "${PERMUTATIONS}"
            --permutation-seed "${PERMUTATION_SEED}"
          )

          if [[ -n "${PARTICIPANTS}" ]]; then
            cmd+=(--participants "${PARTICIPANTS}")
          fi

          if [[ -n "${CLASSIFIER_PARAM}" ]]; then
            cmd+=(--classifier-param "${CLASSIFIER_PARAM}")
          fi

          printf 'Running command:'
          printf ' %q' "${cmd[@]}"
          printf '\n'
          "${cmd[@]}"

          {
            echo "# Stimulus decoding run"
            echo
            echo "- Data directory: \`${PYMEGDEC_ANALYSIS_DATA_DIR}\`"
            echo "- Participants: \`${PARTICIPANTS:-auto-detected}\`"
            echo "- Time-window centers: \`${TIME_WINDOW}\`"
            echo "- Window step: \`${WINDOW_STEP_S}\` s"
            echo "- Window size: \`${WINDOW_SIZE}\` s"
            echo "- Classifier: \`${CLASSIFIER}\`"
            echo "- PCA components: \`${COMPONENTS_PCA}\`"
            echo "- Frequency range: \`${FREQUENCY_LOW}\` to \`${FREQUENCY_HIGH}\` Hz"
            echo "- Chance level: 1 / ${CHANCE_CLASSES}"
            echo "- Permutations: \`${PERMUTATIONS}\`"
            echo "- Permutation seed: \`${PERMUTATION_SEED}\`"
            echo
            echo "The workflow forces \`--null-window-center nan\`. Therefore pre-stimulus time points are evaluated as ordinary 16-way decoding windows instead of being appended as a separate null class. Compare pre-stimulus accuracy with post-stimulus accuracy in the summary CSV/plots."
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload decoding outputs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ inputs.output_prefix }}-outputs
          path: outputs/
          if-no-files-found: warn
