name: Apply trial selection fix

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-trial-selection-fix.yml
      - .github/scripts/apply_trial_selection_fix.py

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Apply seeded trial-selection patch
        run: python .github/scripts/apply_trial_selection_fix.py
      - name: Commit and push
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/pymegdec/_stimulus_cross_subject_core.py src/pymegdec/stimulus_cli.py tests/test_stimulus_cross_subject.py docs/stimulus-decoding.md docs/cli.md
          git commit -m "Use seeded random trial caps"
          git push
