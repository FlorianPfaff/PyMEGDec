name: Model-transfer tests

permissions:
  contents: read
  checks: write

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - classifier: multiclass-svm
            test-target: tests.test_model_transfer.TestEvaluateModelTransfer.test_evaluate_model_transfer_accuracy_svm
          - classifier: scikit-mlp
            test-target: tests.test_model_transfer.TestEvaluateModelTransfer.test_evaluate_model_transfer_accuracy_scikit_mlp
          - classifier: pytorch-mlp
            test-target: tests.test_model_transfer.TestEvaluateModelTransfer.test_evaluate_model_transfer_accuracy_pytorch_mlp

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
        cache: pip
        cache-dependency-path: |
          pyproject.toml
          poetry.lock

    - name: Install package
      run: |
        python -m pip install --upgrade pip
        python -m pip install -e ".[dev]"

    - name: Cache downloaded data
      id: cache-data
      uses: actions/cache@v5
      with:
        path: data
        key: ${{ runner.os }}-model-transfer-data

    - name: Download Data
      if: steps.cache-data.outputs.cache-hit != 'true'
      run: |
        mkdir -p data
        cd data
        wget -q ${{ secrets.DOWNLOAD_URL }}
        wget -q ${{ secrets.DOWNLOAD_URL_CUE }}
        cd ..

    - name: Run tests
      env:
        PYMEGDEC_DATA_DIR: data
      run: python -m unittest ${{ matrix.test-target }}
